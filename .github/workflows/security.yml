name: Enterprise Security Audit

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0" # Weekly scan

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      BETTER_AUTH_SECRET: "ci-secret-value-with-32-random-chars-abcdef123456"
      BETTER_AUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_DISABLE_RUNTIME_ANALYTICS: "true"
      SEARCH_BACKEND: "postgres"
      MEILISEARCH_HOST: "http://localhost:7700"
      MEILISEARCH_API_KEY: "ci_bypass_key"
      UPSTASH_REDIS_REST_URL: "https://ci.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "ci_token"
      REDIS_URL: "redis://localhost:6379"
      OPENAI_API_KEY: "sk-ci-placeholder"
      GEMINI_API_KEY: "ci-gemini-key-1234567890"
      CLOUDINARY_CLOUD_NAME: "ci-cloud"
      CLOUDINARY_API_KEY: "ci-api-key"
      CLOUDINARY_API_SECRET: "ci-api-secret"
      GOOGLE_CLIENT_ID: "ci-google-client-id"
      GOOGLE_CLIENT_SECRET: "ci-google-client-secret"
      RAZORPAY_MODE: "test"
      RAZORPAY_KEY_ID: "rzp_test_ci_1234567890"
      RAZORPAY_KEY_SECRET: "ci_razorpay_secret"
      NEXT_PUBLIC_RAZORPAY_KEY_ID: "rzp_test_ci_1234567890"
      RAZORPAY_PLAN_ID_PRO: "plan_ci_pro_001"
      RAZORPAY_PLAN_ID_ENTERPRISE: "plan_ci_enterprise_001"
      SCAN_PROCESSING_MODE: "inline"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run security preflight
        run: npm run security:preflight

      - name: Run NPM Audit (Critical Vulnerabilities Only)
        run: npm audit --audit-level=critical

      - name: Run Static Analysis (ESLint)
        run: npm run lint -- --max-warnings 200

      - name: Theme drift audit (report-only)
        run: npm run theme:audit
        continue-on-error: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript

      - name: Autobuild (CodeQL)
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript,typescript"

      - name: Secret Scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
