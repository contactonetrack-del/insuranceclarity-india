name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # CI stubs — real values stored in Vercel env vars, not needed for build type-checking
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      NEXTAUTH_SECRET: "ci-secret-value-with-32-random-chars-abcdef123456"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_DISABLE_RUNTIME_ANALYTICS: "true"
      SEARCH_BACKEND: "postgres"
      MEILISEARCH_HOST: "http://localhost:7700"
      MEILISEARCH_API_KEY: "ci_bypass_key"
      UPSTASH_REDIS_REST_URL: "https://ci.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "ci_token"
      REDIS_URL: "redis://localhost:6379"
      OPENAI_API_KEY: "sk-ci-placeholder"
      RAZORPAY_KEY_ID: "rzp_test_ci_1234567890"
      RAZORPAY_KEY_SECRET: "ci_razorpay_secret"
      NEXT_PUBLIC_RAZORPAY_KEY_ID: "rzp_test_ci_1234567890"
      CLOUDINARY_CLOUD_NAME: "ci-cloud"
      CLOUDINARY_API_KEY: "ci-api-key"
      CLOUDINARY_API_SECRET: "ci-api-secret"
      GOOGLE_CLIENT_ID: "ci-google-client-id"
      GOOGLE_CLIENT_SECRET: "ci-google-client-secret"
      RAZORPAY_MODE: "test"
      RAZORPAY_PLAN_ID_PRO: "plan_ci_pro_001"
      RAZORPAY_PLAN_ID_ENTERPRISE: "plan_ci_enterprise_001"
      SCAN_PROCESSING_MODE: "inline"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (warnings allowed, errors surfaced)
        run: npm run lint -- --max-warnings 200

      - name: Run security preflight
        run: npm run security:preflight

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test -- --run

      - name: Build application
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=critical

  e2e:
    name: E2E Tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      NEXTAUTH_SECRET: "ci-secret-value-with-32-random-chars-abcdef123456"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_DISABLE_RUNTIME_ANALYTICS: "true"
      SEARCH_BACKEND: "postgres"
      MEILISEARCH_HOST: "http://localhost:7700"
      MEILISEARCH_API_KEY: "ci_bypass_key"
      UPSTASH_REDIS_REST_URL: "https://ci.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "ci_token"
      REDIS_URL: "redis://localhost:6379"
      OPENAI_API_KEY: "sk-ci-placeholder"
      RAZORPAY_KEY_ID: "rzp_test_ci_1234567890"
      RAZORPAY_KEY_SECRET: "ci_razorpay_secret"
      NEXT_PUBLIC_RAZORPAY_KEY_ID: "rzp_test_ci_1234567890"
      CLOUDINARY_CLOUD_NAME: "ci-cloud"
      CLOUDINARY_API_KEY: "ci-api-key"
      CLOUDINARY_API_SECRET: "ci-api-secret"
      GOOGLE_CLIENT_ID: "ci-google-client-id"
      GOOGLE_CLIENT_SECRET: "ci-google-client-secret"
      RAZORPAY_MODE: "test"
      RAZORPAY_PLAN_ID_PRO: "plan_ci_pro_001"
      RAZORPAY_PLAN_ID_ENTERPRISE: "plan_ci_enterprise_001"
      SCAN_PROCESSING_MODE: "inline"


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        run: npm run build

      - name: Start server and run E2E tests
        env:
          PLAYWRIGHT_SKIP_WEB_SERVER: "1"
          PLAYWRIGHT_BASE_URL: "http://127.0.0.1:3000"
          NEXT_PUBLIC_DISABLE_RUNTIME_ANALYTICS: "true"
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 &
          npx wait-on http://127.0.0.1:3000 --timeout 60000
          npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
