name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # CI stubs — real values stored in Vercel env vars, not needed for build type-checking
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      NEXTAUTH_SECRET: "ci-secret-placeholder-32-chars-long"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      MEILISEARCH_HOST: "http://localhost:7700"
      MEILISEARCH_API_KEY: "ci_bypass_key"
      UPSTASH_REDIS_REST_URL: "https://ci.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "ci_token"
      REDIS_URL: "redis://localhost:6379"
      OPENAI_API_KEY: "sk-ci-placeholder"
      GOOGLE_CLIENT_ID: "ci-google-client-id"
      GOOGLE_CLIENT_SECRET: "ci-google-client-secret"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint (warnings allowed, errors surfaced)
        run: npm run lint -- --max-warnings 200
        continue-on-error: true

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test -- --run

      - name: Build application
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=critical
        continue-on-error: true

  e2e:
    name: E2E Tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      NEXTAUTH_SECRET: "ci-secret-placeholder-32-chars-long"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      MEILISEARCH_HOST: "http://localhost:7700"
      MEILISEARCH_API_KEY: "ci_bypass_key"
      UPSTASH_REDIS_REST_URL: "https://ci.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "ci_token"
      REDIS_URL: "redis://localhost:6379"
      OPENAI_API_KEY: "sk-ci-placeholder"
      GOOGLE_CLIENT_ID: "ci-google-client-id"
      GOOGLE_CLIENT_SECRET: "ci-google-client-secret"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        run: npm run build

      - name: Start server and run E2E tests
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000
          npm run test:e2e
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
